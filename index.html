<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2km.ee — Kaupo Karuse</title>
    <meta name="description" content="Kaupo Karuse — 2km.ee">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

        :root {
            --bg-deep: #0a0612;
            --bg-mid: #120b22;
            --purple-core: #8b5cf6;
            --purple-light: #c4b5fd;
            --purple-hot: #a78bfa;
            --purple-glow: #7c3aed;
            --purple-muted: #6d28d9;
            --text-primary: #ede9fe;
            --text-dim: #a095c0;
        }

        html { font-size: 16px; }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* === BACKGROUND LAYERS === */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(109,40,217,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 20%, rgba(139,92,246,0.1) 0%, transparent 50%),
                radial-gradient(ellipse 100% 100% at 50% 50%, rgba(18,11,34,1) 0%, rgba(10,6,18,1) 100%);
            z-index: 0;
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.035;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* === FLOATING WATERMARK === */
        .watermark {
            position: fixed;
            z-index: 1;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(20rem, 35vw, 40rem);
            color: transparent;
            -webkit-text-stroke: 1px rgba(139,92,246,0.06);
            letter-spacing: -0.04em;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            user-select: none;
            pointer-events: none;
            animation: watermarkDrift 20s ease-in-out infinite;
        }

        @keyframes watermarkDrift {
            0%, 100% { transform: translate(-50%, -50%) rotate(-2deg) scale(1); }
            50% { transform: translate(-48%, -52%) rotate(1deg) scale(1.02); }
        }

        /* === FLOATING GEOMETRY === */
        .geo {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            border: 1px solid rgba(139,92,246,0.12);
            animation: float 12s ease-in-out infinite;
        }

        .geo--1 {
            width: 300px; height: 300px;
            border-radius: 50%;
            top: 10%; right: -5%;
            border-color: rgba(139,92,246,0.08);
            animation-duration: 18s;
        }
        .geo--2 {
            width: 150px; height: 150px;
            top: 60%; left: 5%;
            transform: rotate(45deg);
            animation-duration: 14s;
            animation-delay: -3s;
        }
        .geo--3 {
            width: 80px; height: 80px;
            border-radius: 50%;
            top: 25%; left: 30%;
            border-color: rgba(167,139,250,0.1);
            animation-duration: 10s;
            animation-delay: -7s;
        }
        .geo--4 {
            width: 200px; height: 200px;
            bottom: 10%; right: 15%;
            transform: rotate(15deg);
            border-color: rgba(124,58,237,0.08);
            animation-duration: 22s;
            animation-delay: -5s;
        }
        .geo--5 {
            width: 60px; height: 60px;
            border-radius: 50%;
            top: 70%; right: 30%;
            border-color: rgba(196,181,253,0.1);
            animation-duration: 9s;
            animation-delay: -2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            25% { opacity: 1; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.8; }
            75% { opacity: 1; }
        }

        /* === GLOW ORB (mouse-following via CSS, enhanced with JS) === */
        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: left 0.8s ease-out, top 0.8s ease-out;
            left: 50%;
            top: 50%;
        }

        /* === MAIN CONTENT === */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        /* Horizontal rule accent */
        .accent-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--purple-core), transparent);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.3s forwards;
        }

        .name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 7vw, 5.5rem);
            letter-spacing: -0.03em;
            line-height: 1.05;
            background: linear-gradient(
                135deg,
                var(--text-primary) 0%,
                var(--purple-light) 40%,
                var(--purple-hot) 70%,
                var(--purple-core) 100%
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation:
                fadeSlideUp 0.9s ease-out 0.5s forwards,
                shimmer 8s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .domain {
            font-family: 'Syne', sans-serif;
            font-weight: 400;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 1.2rem;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.8s forwards;
        }

        .divider {
            width: 1px;
            height: 50px;
            background: linear-gradient(180deg, rgba(139,92,246,0.4), transparent);
            margin: 2.5rem 0;
            opacity: 0;
            animation: fadeSlideUp 0.7s ease-out 1.1s forwards;
        }

        .email-link {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(0.95rem, 1.5vw, 1.1rem);
            color: var(--purple-light);
            text-decoration: none;
            padding: 0.8rem 1.8rem;
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 100px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 1.4s forwards;
            transition: all 0.4s ease;
        }

        .email-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(124,58,237,0.04));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .email-link:hover {
            border-color: rgba(139,92,246,0.5);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139,92,246,0.15);
        }

        .email-link:hover::before { opacity: 1; }

        .email-link svg {
            width: 16px;
            height: 16px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .email-link span {
            position: relative;
            z-index: 1;
        }

        /* === CORNER MARKS === */
        .corner {
            position: fixed;
            z-index: 10;
            width: 30px;
            height: 30px;
            border-color: rgba(139,92,246,0.15);
            border-style: solid;
            border-width: 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.8s forwards;
        }
        .corner--tl { top: 24px; left: 24px; border-top-width: 1px; border-left-width: 1px; }
        .corner--tr { top: 24px; right: 24px; border-top-width: 1px; border-right-width: 1px; }
        .corner--bl { bottom: 24px; left: 24px; border-bottom-width: 1px; border-left-width: 1px; }
        .corner--br { bottom: 24px; right: 24px; border-bottom-width: 1px; border-right-width: 1px; }

        /* === STATUS DOT === */
        .status {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
            opacity: 0;
            animation: fadeIn 1s ease-out 2.2s forwards;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--purple-core);
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; box-shadow: 0 0 0 0 rgba(139,92,246,0.3); }
            50% { opacity: 1; box-shadow: 0 0 12px 4px rgba(139,92,246,0.15); }
        }

        /* === ANIMATIONS === */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* === RESPONSIVE === */
        @media (max-width: 640px) {
            .geo--1 { width: 180px; height: 180px; }
            .geo--4 { width: 120px; height: 120px; }
            .corner { width: 20px; height: 20px; top: 16px; }
            .corner--tl, .corner--bl { left: 16px; }
            .corner--tr, .corner--br { right: 16px; }
            .corner--bl, .corner--br { bottom: 16px; }
        }
    </style>
</head>
<body>
    <!-- Background layers -->
    <div class="bg-gradient"></div>
    <div class="grain"></div>
    <div class="watermark">2km</div>
    <div class="orb" id="orb"></div>

    <!-- Floating geometry -->
    <div class="geo geo--1"></div>
    <div class="geo geo--2"></div>
    <div class="geo geo--3"></div>
    <div class="geo geo--4"></div>
    <div class="geo geo--5"></div>

    <!-- Corner marks -->
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <!-- Main content -->
    <main class="content">
        <div class="accent-line"></div>
        <h1 class="name">Kaupo Karuse</h1>
        <p class="domain">2km.ee</p>
        <div class="divider"></div>
        <a href="mailto:kaupo@2km.ee" class="email-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 4L12 13L2 4"/>
            </svg>
            <span>kaupo@2km.ee</span>
        </a>
    </main>

    <!-- Status -->
    <div class="status">
        <div class="status-dot"></div>
        <span>Coming soon</span>
    </div>

    <script>
        // Subtle orb follows mouse
        const orb = document.getElementById('orb');
        document.addEventListener('mousemove', (e) => {
            orb.style.left = e.clientX + 'px';
            orb.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
